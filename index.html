<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HUDSON Protocol — YMCA Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#06090F;--bg2:#0B1120;--bg3:#111B2E;--bg4:#162240;--bg5:#1a2844;
--bdr:#1E293B;--bdr2:#2D3A52;
--t1:#F1F5F9;--t2:#94A3B8;--t3:#64748B;--t4:#475569;
--helm:#7C3AED;--ace:#10B981;--aida:#3B82F6;--fred:#F59E0B;
--rose:#F43F5E;--cyan:#06B6D4;
--helm15:rgba(124,58,237,.12);--ace15:rgba(16,185,129,.12);
--aida15:rgba(59,130,246,.12);--fred15:rgba(245,158,11,.12);
--rose15:rgba(244,63,94,.12);
}
html{background:var(--bg)}
body{font-family:'Instrument Sans',sans-serif;color:var(--t1);background:var(--bg);line-height:1.55;overflow:hidden;height:100vh}
h1,h2,h3,h4{font-weight:700;line-height:1.2}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* Layout */
#root{display:flex;height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.page{padding:28px 32px 60px;max-width:1400px;margin:0 auto}
@media(max-width:900px){.sidebar{width:56px;min-width:56px}.sidebar .nav-text,.sidebar .logo-text,.sidebar .sidebar-footer{display:none}.nav-item{justify-content:center;padding:12px}}

/* Sidebar */
.logo-area{padding:20px 18px;border-bottom:1px solid var(--bdr)}
.logo-icon{font-size:1.4rem}
.logo-text{margin-left:8px}
.logo-text .title{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.85rem;color:var(--aida);letter-spacing:2px}
.logo-text .sub{font-size:.6rem;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.nav-section{padding:16px 10px;flex:1;overflow-y:auto}
.nav-group-label{font-size:.6rem;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;margin-top:14px}
.nav-group-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--t2);transition:all .15s;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--bg4);color:var(--t1);border-color:var(--bdr2)}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:14px 18px;border-top:1px solid var(--bdr);font-size:.6rem;color:var(--t4);text-align:center;letter-spacing:.5px}

/* Cards */
.card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--bdr);border-radius:14px;padding:22px;transition:border-color .2s}
.card:hover{border-color:var(--bdr2)}
.g{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1100px){.g4,.g5{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}}

/* Badges */
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase}

/* Metrics */
.mv{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1}
.ml{font-size:.72rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.md{font-size:.72rem;margin-top:2px}

/* Tables */
.tbl-wrap{overflow-x:auto;border:1px solid var(--bdr);border-radius:12px;background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--bg3);color:var(--t2);font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;white-space:nowrap;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:2}
th:hover{color:var(--t1)}
td{padding:9px 14px;border-bottom:1px solid var(--bdr);color:var(--t2)}
tr:hover td{background:rgba(59,130,246,.04);color:var(--t1)}
.tbl-scroll{max-height:500px;overflow-y:auto}

/* Inputs */
.search-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;color:var(--t1);font-family:'Instrument Sans',sans-serif;font-size:.82rem;outline:none;width:100%;transition:border-color .2s}
.search-box:focus{border-color:var(--aida)}
.search-box::placeholder{color:var(--t4)}
select.search-box{cursor:pointer;-webkit-appearance:none}
.slider{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bdr);outline:none;margin:6px 0}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--aida);cursor:pointer;border:2px solid var(--bg)}

/* Bars */
.bar-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Dot */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* Alert */
.alert-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:14px 18px;margin-bottom:8px;border-left:3px solid}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--bdr);margin-bottom:20px}
.tab{padding:8px 18px;font-size:.78rem;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--aida);border-bottom-color:var(--aida)}

/* Olivia */
.olivia-msg{background:var(--bg3);border:1px solid var(--bdr);border-radius:14px 14px 14px 4px;padding:16px 20px;margin-bottom:12px;margin-left:44px;position:relative}
.olivia-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--helm),var(--aida));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;position:absolute;left:-44px;top:0;color:white}

/* Path cards */
.path-s{border-left:3px solid var(--ace)}
.path-f{border-left:3px solid var(--rose)}

/* Prob ring SVG */
.prob-ring text{font-family:'JetBrains Mono',monospace}

/* Rem grid */
.rem-g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.rem-g{grid-template-columns:repeat(2,1fr)}}

/* CTA */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:10px;font-weight:600;font-size:.82rem;border:none;cursor:pointer;transition:all .2s;font-family:'Instrument Sans',sans-serif}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--aida),var(--helm));color:white}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--bdr)}
.btn-ghost:hover{border-color:var(--aida);color:var(--t1)}

/* Page header */
.ph{margin-bottom:28px}
.ph-badge{margin-bottom:6px}
.ph h1{font-size:1.6rem;letter-spacing:-.3px}
.ph p{color:var(--t2);font-size:.9rem;margin-top:4px;max-width:700px}

/* Expand */
.exp-btn{background:none;border:1px solid var(--bdr);color:var(--t2);padding:6px 14px;border-radius:6px;font-size:.72rem;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .15s}
.exp-btn:hover{border-color:var(--aida);color:var(--t1)}

/* Stat bar with label */
.stat-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stat-bar-label{width:140px;font-size:.78rem;color:var(--t2);flex-shrink:0;text-align:right}
.stat-bar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px}
.stat-bar-val{width:50px;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;

/* ═══════════════════════════════════════════════════════════════
   SEEDED PRNG
   ═══════════════════════════════════════════════════════════════ */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng=mulberry32(42);
const R=()=>rng();
const Ri=(a,b)=>Math.floor(R()*(b-a+1))+a;
const Rp=(arr)=>arr[Math.floor(R()*arr.length)];
const Rn=(mu,sig)=>{let u=0,v=0;while(u===0)u=R();while(v===0)v=R();return mu+sig*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
const Rb=(a,b)=>{let x=0,y=0;for(let i=0;i<a;i++)x+=-Math.log(1-R());for(let i=0;i<b;i++)y+=-Math.log(1-R());return x/(x+y);}

/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════════ */
const BRANCHES=['Downtown Cincinnati','Mason Family','Clippard Family','Camp Ernst','Gamble-Nippert','Blue Ash','Anderson','Xenia'];
const SEGMENTS=['Youth','Young Adult','Adult','Senior'];
const PROGRAMS=['Youth Swim Lessons','Senior Fitness','After-School Care','Personal Training','Group Exercise','Youth Basketball','Cancer Survivors Wellness','Diabetes Prevention','Family Camp','Childwatch','Teen Leaders','Aquatics Therapy'];
const FIRST_NAMES=['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Elizabeth','William','Barbara','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Charles','Karen','Christopher','Lisa','Daniel','Nancy','Matthew','Betty','Anthony','Margaret','Mark','Sandra','Donald','Ashley','Steven','Kimberly','Andrew','Emily','Paul','Donna','Joshua','Michelle','Kenneth','Carol','Kevin','Amanda','Brian','Dorothy','George','Melissa','Timothy','Deborah','Ronald','Stephanie','Edward','Rebecca','Jason','Sharon','Jeffrey','Laura','Ryan','Cynthia','Marcus','Olivia','Haidar','Aaliyah','DeShawn','Priya','Wei','Carlos','Fatima','Kenji','Sofia','Amir','Nia','Raj','Luna','Andre','Mei','Dante','Zara','Omar','Yuki','Elijah','Amara','Diego','Sita','Jamal','Lila','Mateo','Aya','Kofi','Iris'];
const LAST_NAMES=['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts','Patel','Shah','Kim','Chen','Wang','Singh','Cohen','Ali','Hassan','Yamamoto','Tanaka','Mueller','Schneider','Okafor','Mensah','Diaz','Santos','Reyes'];
const DEPTS=['Member Services','Aquatics','Youth Development','Health & Wellness','Administration','Facilities','Community Outreach','Finance'];
const ROLES=['Program Director','Instructor','Front Desk','Personal Trainer','Lifeguard','Counselor','Manager','Coordinator','Specialist','Administrator'];

/* ═══════════════════════════════════════════════════════════════
   DATA GENERATION — 2000 Members, 200 Staff
   ═══════════════════════════════════════════════════════════════ */
const genMembers=(n=2000)=>{
  const arr=[];
  for(let i=0;i<n;i++){
    const age=Math.round(Math.min(82,Math.max(6,Rn(38,15))));
    const seg=age<18?'Youth':age<30?'Young Adult':age<55?'Adult':'Senior';
    const eng=Rb(4,3)*100;
    const health=(eng*0.6+Rn(30,8));
    const tenure=Math.round(Math.min(120,Math.max(1,Rn(24,18))));
    const visits=Math.min(30,Math.max(0,Math.round(Rn(6,3))));
    const progs=Math.min(6,Math.max(0,Math.round(Rn(1.5,1))));
    const churn=Math.min(1,Math.max(0,((100-health)/100)*R()*1.3));
    const branch=Rp(BRANCHES);
    const enrolled=[];
    for(let p=0;p<progs;p++){const pr=Rp(PROGRAMS);if(!enrolled.includes(pr))enrolled.push(pr);}
    arr.push({
      id:`MBR-${String(i+1).padStart(5,'0')}`,
      name:`${Rp(FIRST_NAMES)} ${Rp(LAST_NAMES)}`,
      age,segment:seg,branch,
      engagement:Math.round(eng*10)/10,
      health:Math.round(Math.min(100,Math.max(0,health))*10)/10,
      tenure,visits,
      programs:enrolled,
      churn:Math.round(churn*1000)/1000,
      nps:Math.round(Rn(55,18)),
      lastVisit:Ri(0,30),
      joinDate:`2${Ri(22,25)}-${String(Ri(1,12)).padStart(2,'0')}-${String(Ri(1,28)).padStart(2,'0')}`,
    });
  }
  return arr;
};

const genStaff=(n=200)=>{
  const arr=[];
  for(let i=0;i<n;i++){
    const tenure=Math.round(Math.min(180,Math.max(1,Rn(30,24))));
    const satisfaction=Math.round(Rb(6,2)*100*10)/10;
    const impact=Math.round(Rb(4,3)*100*10)/10;
    const turnoverRisk=Math.min(1,Math.max(0,(100-satisfaction)/100*R()*1.2));
    arr.push({
      id:`STF-${String(i+1).padStart(4,'0')}`,
      name:`${Rp(FIRST_NAMES)} ${Rp(LAST_NAMES)}`,
      role:Rp(ROLES),
      department:Rp(DEPTS),
      branch:Rp(BRANCHES),
      tenure,
      satisfaction,
      impactScore:impact,
      turnoverRisk:Math.round(turnoverRisk*1000)/1000,
      membersServed:Ri(15,200),
      certifications:Ri(0,5),
      salary:Ri(28000,72000),
    });
  }
  return arr;
};

const MEMBERS=genMembers(2000);
const STAFF=genStaff(200);

/* ═══════════════════════════════════════════════════════════════

  {id:6,name:'Digital Marketing Effectiveness',cat:'Marketing',mu:.33,rank:6},
  {id:7,name:'Newcomer Integration Speed',cat:'Community',mu:.29,rank:7},
  {id:8,name:'Competitive Differentiation',cat:'Marketing',mu:.44,rank:8},
  {id:9,name:'Program Capacity Optimization',cat:'Operations',mu:.72,rank:9},
  {id:10,name:'Member Social Connectivity',cat:'Community',mu:.51,rank:10},
  {id:11,name:'Group Program Participation',cat:'Community',mu:.58},{id:12,name:'Volunteer Activation Rate',cat:'Community',mu:.44},
  {id:13,name:'Community Event Frequency',cat:'Community',mu:.52},{id:14,name:'Member Interaction Density',cat:'Community',mu:.39},
  {id:15,name:'Family Engagement Breadth',cat:'Community',mu:.63},{id:16,name:'Youth Program Penetration',cat:'Community',mu:.71},
  {id:17,name:'Senior Community Vitality',cat:'Community',mu:.66},{id:18,name:'Long-Term Member Loyalty',cat:'Retention',mu:.78},
  {id:19,name:'NPS Momentum',cat:'Retention',mu:.55},{id:20,name:'Complaint Resolution Speed',cat:'Retention',mu:.62},
  {id:21,name:'Facility Satisfaction Index',cat:'Retention',mu:.74},{id:22,name:'Program Satisfaction Depth',cat:'Retention',mu:.69},
  {id:23,name:'Staff-Member Relationship Quality',cat:'Retention',mu:.35},{id:24,name:'Renewal Predictability',cat:'Retention',mu:.58},
  {id:25,name:'Churn Warning Sensitivity',cat:'Retention',mu:.41},{id:26,name:'Win-Back Effectiveness',cat:'Retention',mu:.33},
  {id:27,name:'Geographic Market Penetration',cat:'Marketing',mu:.52},{id:28,name:'Demographic Reach Diversity',cat:'Marketing',mu:.61},
  {id:29,name:'Social Media Engagement',cat:'Marketing',mu:.28},{id:30,name:'Local Media Presence',cat:'Marketing',mu:.36},
  {id:31,name:'Facility Utilization Efficiency',cat:'Operations',mu:.72},{id:32,name:'Revenue Diversification Index',cat:'Operations',mu:.48},
  {id:33,name:'Grant Pipeline Health',cat:'Operations',mu:.31},{id:34,name:'Operational Cost Efficiency',cat:'Operations',mu:.65},
  {id:35,name:'Technology Infrastructure',cat:'Operations',mu:.27},{id:36,name:'Data-Driven Decision Readiness',cat:'Operations',mu:.22},
  {id:37,name:'Financial Reserve Adequacy',cat:'Operations',mu:.59},{id:38,name:'Pricing Competitiveness',cat:'Operations',mu:.54},
  {id:39,name:'Cross-Branch Resource Sharing',cat:'Operations',mu:.41},{id:40,name:'Staff Retention & Development',cat:'People',mu:.38},
  {id:41,name:'Leadership Vision Alignment',cat:'People',mu:.67},{id:42,name:'Mission-Driven Culture Strength',cat:'People',mu:.73},
  {id:43,name:'Staff Digital Literacy',cat:'People',mu:.31},{id:44,name:'Organizational Adaptability',cat:'People',mu:.45},
  {id:45,name:'Cross-Functional Collaboration',cat:'People',mu:.52},{id:46,name:'Board Engagement & Advocacy',cat:'People',mu:.64},
  {id:47,name:'Institutional Knowledge Preservation',cat:'People',mu:.56},{id:48,name:'Innovation Capacity',cat:'People',mu:.34},
  {id:49,name:'Equity & Inclusion Embeddedness',cat:'People',mu:.68},{id:50,name:'Community Partnership Density',cat:'Community',mu:.57},
];
const TOP10=FUZZY_ALL.filter(f=>f.rank).sort((a,b)=>a.rank-b.rank);
const WEAK=TOP10.filter(f=>f.mu<0.45);

/* Upcoming events with multiple success/failure paths */
const EVENTS=[
  {name:'Summer Membership Surge',period:'May–Aug 2026',
    sp:[{l:'Launch ACE summer micro-communities',p:.78,d:'Form outdoor activity groups 60 days before summer. Pre-built belonging captures surge members before they default to solo usage.'},{l:'Deploy Olivia onboarding within 48h',p:.72,d:'Every new summer member receives personalized welcome with group match. Compress relationship formation from months to days.'},{l:'Partner with 3 community orgs',p:.65,d:'Open Y events in parks. ACE groups host public sessions. Zero-cost acquisition.'}],
    fp:[{l:'Treat surge as gym traffic',p:.55,d:'Default amenity marketing. Members join, use pool 6 weeks, form zero connections, cancel September.'},{l:'Staff overwhelmed — skip personalization',p:.48,d:'1,000:1 ratio makes outreach impossible without HELM. Generic welcome emails. 40% churn by month 3.'}]},
  {name:'New Year Resolution Wave',period:'Jan–Feb 2027',
    sp:[{l:'AIDA goal plans activated day 1',p:.81,d:'Every resolution member gets governing-rule extraction and gap analysis in first week.'},{l:'ACE accountability groups immediately',p:.74,d:'95% more likely to reach goals with a partner. ACE creates partners algorithmically on day one.'},{l:'FRED 30/60/90 day tracking live',p:.70,d:'Churn scoring triggers Olivia interventions before mental checkout. 73% return rate within 48h.'}],
    fp:[{l:'Sell without transformation infrastructure',p:.62,d:'Industry standard: 96% of fitness app users churn in 90 days. Same trajectory.'},{l:'Rely on willpower narrative',p:.58,d:'"Just keep coming!" is not retention strategy. Without governing-rule alignment, burnout is guaranteed.'}]},
  {name:'Back-to-School Transition',period:'Aug–Sep 2026',
    sp:[{l:'ACE adapts group schedules proactively',p:.69,d:'FRED predicts shifts 30 days ahead. ACE reorganizes before disengagement.'},{l:'Youth program family cross-sell',p:.73,d:'Parents enrolling kids receive Olivia recommendation for own programming.'}],
    fp:[{l:'Lose adults while gaining youth',p:.52,d:'Schedule changes drop adult visits 30% in September.'},{l:'Program capacity mismatch',p:.44,d:'Youth overflow, adult underutilize. Resources misallocated 6-8 weeks.'}]},
  {name:'Holiday Season Drop-off',period:'Nov–Dec 2026',
    sp:[{l:'Olivia holiday engagement campaign',p:.71,d:'Personalized check-ins, goal recalibration, community invitations. Targeted, timed, individual.'},{l:'ACE seasonal community events',p:.66,d:'Holiday charity drives and family events maintain bonds even when gym visits decline.'}],
    fp:[{l:'Go silent and hope for January',p:.60,d:'Two months zero contact. January becomes re-acquisition at 10× cost.'},{l:'Generic "We miss you" emails',p:.53,d:'Broadcast confirms members are numbers, not people.'}]},
  {name:'Local Competitor Expansion',period:'Q3 2026',
    sp:[{l:'Double down on belonging',p:.76,d:'No gym chain has algorithmic micro-communities, Olivia, or governing-rule roadmaps. Mission IS the moat.'},{l:'FRED competitive intelligence',p:.68,d:'Real-time sentiment and churn tracking in affected branch.'}],

    sp:[{l:'AIDA staff development framework',p:.73,d:'Staff receive same identity-level modeling. Don\'t leave for $0.50/hr.'},{l:'FRED Mission Impact Scorecards',p:.77,d:'Staff see exactly which outcomes their work produced.'}],

/* Probability computation */
function computeProb(){
  let sw=0,fw=0;
  EVENTS.forEach(e=>{e.sp.forEach(p=>sw+=p.p);e.fp.forEach(p=>fw+=p.p)});
  const raw=sw/(sw+fw);
  const avgMu=TOP10.reduce((s,f)=>s+f.mu,0)/TOP10.length;
  return Math.round(raw*avgMu*100*1.55);
}
const PROBABILITY=computeProb();

/* ═══════════════════════════════════════════════════════════════
   SORTABLE TABLE
   ═══════════════════════════════════════════════════════════════ */
function DataTable({columns,data,maxH=500}){
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState('desc');
  const sorted=useMemo(()=>{
    if(!sortCol)return data;
    return[...data].sort((a,b)=>{
      let va=a[sortCol],vb=b[sortCol];
      if(typeof va==='string')return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
      return sortDir==='asc'?va-vb:vb-va;
    });
  },[data,sortCol,sortDir]);
  const handleSort=(col)=>{
    if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortCol(col);setSortDir('desc');}
  };
  return(
    <div className="tbl-wrap">
      <div className="tbl-scroll" style={{maxHeight:maxH}}>
        <table>
          <thead><tr>{columns.map(c=>(
            <th key={c.key} onClick={()=>handleSort(c.key)} style={{cursor:'pointer'}}>
              {c.label} {sortCol===c.key?(sortDir==='asc'?'↑':'↓'):''}
            </th>
          ))}</tr></thead>
          <tbody>{sorted.map((row,i)=>(
            <tr key={i}>{columns.map(c=>(
              <td key={c.key} style={c.style?c.style(row[c.key],row):{}}>{c.render?c.render(row[c.key],row):row[c.key]}</td>
            ))}</tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

            ))}
          </div>
        ))}
      </div>

      <div className="card" style={{border:'2px solid var(--ace)',padding:28,marginBottom:24}}>
        <div className="g g3" style={{textAlign:'center',marginBottom:20}}>
          <div><div className="mv" style={{color:'var(--ace)'}}>$1.6M</div><div className="ml">Conservative</div></div>
          <div><div className="mv" style={{color:'var(--aida)'}}>$2.9M</div><div className="ml">Moderate</div></div>
          <div><div className="mv" style={{color:'var(--helm)'}}>$4.55M</div><div className="ml">Aggressive</div></div>
        </div>
        <div style={{background:'rgba(16,185,129,.08)',border:'1px solid var(--ace)',borderRadius:10,padding:'16px 20px',textAlign:'center'}}>
          <p style={{fontSize:'.82rem',color:'var(--t2)'}}>Infrastructure Cost: <strong className="mono" style={{color:'var(--t1)'}}>$55,000 – $100,000/year</strong></p>
          <p className="mono" style={{fontSize:'1.2rem',fontWeight:700,color:'var(--ace)',marginTop:6}}>Conservative ROI: 15× floor</p>
        </div>
      </div>

      <div className="card" style={{marginBottom:24}}>
        <h3 style={{marginBottom:16}}>Interactive ROI Calculator</h3>
        <div className="g g3" style={{marginBottom:20}}>
          <div>
            <label style={{fontSize:'.72rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Annual Revenue ($M)</label>
            <input type="range" className="slider" min={10} max={100} value={rev} onChange={e=>setRev(+e.target.value)}/>
            <span className="mono" style={{color:'var(--aida)'}}>${rev}M</span>
          </div>
          <div>
            <label style={{fontSize:'.72rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Retention Improvement (pts)</label>
            <input type="range" className="slider" min={1} max={15} value={ret} onChange={e=>setRet(+e.target.value)}/>
            <span className="mono" style={{color:'var(--aida)'}}>{ret} points</span>
          </div>
          <div>
            <label style={{fontSize:'.72rem',color:'var(--t3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Infrastructure Cost ($K/yr)</label>
            <input type="range" className="slider" min={55} max={150} value={cost} onChange={e=>setCost(+e.target.value)}/>
            <span className="mono" style={{color:'var(--aida)'}}>${cost}K</span>
          </div>
        </div>
        <div className="g g4">
          <MetricCard label="Retention Revenue" value={`$${(retVal/1e6).toFixed(1)}M`} color="var(--ace)"/>
          <MetricCard label="Acquisition Value" value={`$${(acqVal/1e3).toFixed(0)}K`} color="var(--aida)"/>
          <MetricCard label="Total Impact" value={`$${(total/1e6).toFixed(1)}M`} color="var(--fred)"/>
          <MetricCard label="ROI Multiple" value={`${roi}×`} color="var(--helm)"/>
        </div>
      </div>

      <h3 style={{marginBottom:12}}>Product Suite</h3>
      <DataTable columns={[
        {key:'product',label:'Product',style:()=>({color:'var(--t1)',fontWeight:600})},
        {key:'engines',label:'Engines'},
        {key:'onboard',label:'Onboarding'},
        {key:'host',label:'Hosting'},
      ]} data={[
        {product:'HUDSON MINI',engines:'HELM + ACE',onboard:'50%',host:'50%'},
        {product:'HUDSON DREAM',engines:'HELM + ACE + AIDA',onboard:'75%',host:'75%'},
        {product:'HUDSON DASH',engines:'HELM + ACE + FRED',onboard:'75%',host:'75%'},
        {product:'HUDSON (Full)',engines:'HELM + ACE + AIDA + FRED',onboard:'100%',host:'100%'},
      ]}/>
      <div className="card" style={{marginTop:16,textAlign:'center'}}>
        <p style={{color:'var(--t2)',fontSize:'.85rem'}}>YMCAs investing during development receive <strong style={{color:'var(--ace)'}}>dollar-for-dollar credit</strong> against future onboarding. $5,000/month × 10 months = $50,000 reduction.</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR + APP SHELL
   ═══════════════════════════════════════════════════════════════ */
const PAGES=[
  {id:'dash',icon:'📊',label:'Dashboard',group:'Overview'},
  {id:'helm',icon:'🧭',label:'HELM',group:'Engines'},
  {id:'ace',icon:'⚡',label:'ACE',group:'Engines'},
  {id:'aida',icon:'🔬',label:'AIDA',group:'Engines'},
  {id:'fred',icon:'📡',label:'FRED',group:'Engines'},
  {id:'financial',icon:'💰',label:'Financial',group:'Intelligence'},
];

function App(){
  const [page,setPage]=useState('dash');
  let groups={};
  PAGES.forEach(p=>{if(!groups[p.group])groups[p.group]=[];groups[p.group].push(p);});

  return(
    <>
      <div className="sidebar">
        <div className="logo-area" style={{display:'flex',alignItems:'center'}}>
          <span className="logo-icon">🏛️</span>
          <div className="logo-text">
            <div className="title">HUDSON</div>
            <div className="sub">YMCA Intelligence</div>
          </div>
        </div>
        <div className="nav-section">
          {Object.entries(groups).map(([g,items])=>(
            <div key={g}>
              <div className="nav-group-label nav-text">{g}</div>
              {items.map(p=>(
                <div key={p.id} className={`nav-item${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>
                  <span className="nav-icon">{p.icon}</span>
                  <span className="nav-text">{p.label}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">Xtainable LLC · Protocol v5.0<br/>{MEMBERS.length+STAFF.length} records loaded</div>
      </div>
      <div className="main">
        {page==='dash'&&<DashboardPage/>}
        {page==='helm'&&<HelmPage/>}
        {page==='ace'&&<AcePage/>}
        {page==='aida'&&<AidaPage/>}
        {page==='fred'&&<FredPage/>}
        {page==='financial'&&<FinancialPage/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
